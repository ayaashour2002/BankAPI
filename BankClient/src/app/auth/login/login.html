<div class="auth-container">
  <mat-card class="auth-card">
    <div class="auth-header">
      <mat-icon class="bank-icon">account_balance</mat-icon>
      <h1>Bank System</h1>
      <p>Sign in to your account</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        @if (errorMsg) {
          <mat-error class="error-msg">{{ errorMsg }}</mat-error>
        }

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-btn"
          [disabled]="loading"
        >
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Sign In
          }
        </button>
      </form>
    </mat-card-content>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Register</a></p>
    </div>
  </mat-card>
</div>
